<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Session 1: Law, Morality, and Conscience</title>
    <style>
        :root { --primary: #1e3a8a; }
        * { box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 8px;
            background: #f3f4f6;
            min-height: 100dvh;
        }

        .app-container {
            max-width: 960px;
            margin: auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            height: calc(100dvh - 16px);
            display: flex;
            flex-direction: column;
        }

        .slide-viewer {
            flex: 1;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }

        .slide-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .placeholder {
            color: #888;
            font-size: 1.1rem;
            text-align: center;
        }

        .controls {
            padding: 12px;
            background: #f9fafb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-height: 52px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #059669; color: white; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="slide-viewer">
        <img id="slideImg" class="slide-img" alt="Slide" onerror="this.style.display='none'; document.getElementById('placeholder').style.display='block';">
        <div id="placeholder" class="placeholder" style="display:none;">Slide ${currentSlide} Content<br><small>Image not found</small></div>
    </div>

    <div class="controls">
        <button id="prevBtn" class="btn btn-primary" onclick="goBack()">Back</button>
        
        <div style="display:flex; align-items:center; gap:10px; flex:1; justify-content:center;">
            <button id="audioBtn" class="btn btn-secondary" onclick="toggleAudio()">🔊 Play Audio</button>
        </div>
        
        <button id="nextBtn" class="btn btn-primary" onclick="changeSlide(1)">Next</button>
    </div>
</div>

<script>
    let currentSlide = 1;
    const totalSlides = 8;
    let isSpeaking = false;

    const speakerNotes = {
        1: "This presentation explores a long-running legal debate, that’s been going on for over 300 fuckin years, about the role of the jury in England and Wales...",
        2: "The central disagreement is not between lawyers and non-lawyers, but between two legal philosophies...",
        3: "From the perspective of state lawyers and legal eagles, the jury’s role is limited...",
        4: "Civil liberties advocates and some constitutional historians argue the direct opposite...",
        5: "Regardless of all this legal theory, the practical structure of the jury system is important...",
        6: "This is the core of the issue...",
        7: "This debate is not new...",
        8: "The conclusion is, that this is not a legal answer, but a constitutional dilemma..."
    };

    let audioPlayed = {};

    function updateUI() {
        document.getElementById('slideNum').textContent = `Slide ${currentSlide} / ${totalSlides}`; // if you add the span
        document.getElementById('prevBtn').style.visibility = currentSlide === 1 ? 'hidden' : 'visible';
        document.getElementById('slideImg').src = `Slide${currentSlide}.JPG`;
        document.getElementById('slideImg').style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        updateAudioButton();
    }

    function updateAudioButton() {
        const btn = document.getElementById('audioBtn');
        btn.textContent = audioPlayed[currentSlide] ? "🔊 Replay Audio" : "🔊 Play Audio";
    }

    function toggleAudio() {
        const btn = document.getElementById('audioBtn');
        if (isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            updateAudioButton();
        } else {
            speakNotes();
        }
    }

    function speakNotes() {
        const btn = document.getElementById('audioBtn');
        const text = speakerNotes[currentSlide];
        if (!text) return;

        window.speechSynthesis.cancel();
        btn.textContent = "🔊 Speaking...";
        isSpeaking = true;

        const sentences = text.match(/[^.!?]+[.!?]+(?:\s|$)/g) || [text];
        let index = 0;

        const speakNext = () => {
            if (index >= sentences.length) {
                audioPlayed[currentSlide] = true;
                btn.textContent = "🔊 Replay Audio";
                isSpeaking = false;
                return;
            }
            const u = new SpeechSynthesisUtterance(sentences[index].trim());
            u.rate = 0.93;
            u.onend = () => { index++; speakNext(); };
            u.onerror = () => { isSpeaking = false; updateAudioButton(); };
            window.speechSynthesis.speak(u);
        };
        speakNext();
    }

    function goBack() {
        changeSlide(-1);
    }

    function changeSlide(dir) {
        currentSlide = Math.max(1, Math.min(totalSlides, currentSlide + dir));
        window.speechSynthesis.cancel();
        updateUI();
    }

    window.onload = updateUI;
</script>
</body>
</html>
