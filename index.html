<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Session 1: Law, Morality, and Conscience</title>
    <style>
        :root { --primary: #1e3a8a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 8px;
            background: #f3f4f6;
            min-height: 100dvh;
        }

        .app-container {
            max-width: 960px;
            margin: auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            height: calc(100dvh - 16px);
            display: flex;
            flex-direction: column;
        }

        .slide-viewer {
            flex: 1;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }

        .slide-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .quiz-container, .completion-screen {
            position: absolute;
            inset: 0;
            background: #e2f0d9;
            padding: 20px;
            overflow-y: auto;
            display: none;
        }

        .completion-screen {
            background: linear-gradient(135deg, #e0f2fe, #f0fdf4);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .question-block {
            background: white;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .option-btn {
            display: inline-block;
            width: 48%;
            margin: 6px 1%;
            padding: 14px;
            text-align: center;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .option-btn.selected { border-color: #1e3a8a; background: #f0f9ff; }
        .option-btn.correct { border-color: #10b981; background: #d1fae5; }
        .option-btn.wrong { border-color: #ef4444; background: #fee2e2; }

        .controls {
            padding: 12px;
            background: #f9fafb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-height: 52px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #059669; color: white; }
        .btn-quiz { background: #7c3aed; color: white; }
        .btn-restart { background: #64748b; color: white; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="slide-viewer">
        <img id="slideImg" class="slide-img" alt="Slide">
        
        <div id="quizStage" class="quiz-container">
            <div class="quiz-title">Session 1 Quiz: Timing 2 Minutes</div>
            <div id="quizContent"></div>
        </div>

        <div id="completionScreen" class="completion-screen">
            <h1 style="color:#1e3a8a; font-size:2.4rem;">🎉 Quiz Completed!</h1>
            <p id="scoreDisplay" style="font-size:1.6rem; margin:25px 0; font-weight:600;"></p>
            <div style="display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; margin-top:20px;">
                <button class="btn btn-restart" onclick="restartPresentation()">↺ Restart Presentation</button>
                <button class="btn btn-restart" onclick="restartQuiz()">Restart Quiz</button>
                <button class="btn btn-primary" onclick="finishPresentation()">Finish</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn" class="btn btn-primary" onclick="goBack()">Back</button>
        
        <div style="display:flex; align-items:center; gap:10px; flex:1; justify-content:center; flex-wrap:wrap;">
            <span id="slideNum" style="font-weight:600;">Slide 1 / 8</span>
            <button id="audioBtn" class="btn btn-secondary" onclick="toggleAudio()">🔊 Play Audio</button>
            <button id="quizBtn" class="btn btn-quiz" style="display:none;" onclick="showQuiz()">Next</button>
        </div>
        
        <div style="display:flex; gap:8px;">
            <button id="nextBtn" class="btn btn-primary" onclick="changeSlide(1)">Next</button>
        </div>
    </div>
</div>

<script>
    let currentSlide = 1;
    const totalSlides = 8;
    let isInQuiz = false;
    let isSpeaking = false;

    const speakerNotes = {
        1: "This presentation explores a long-running legal debate, that’s been going on for over 300 fuckin years, about the role of the jury in England and Wales. At its core is a disagreement about whether a jury’s ability to return a verdict based on conscience should be understood as a formal legal right, or merely an unwritten practical power, with strings attached within the system. The issue sits between law, morality, and constitutional history. As of now, theres no absolute on how this issue should be dealt with, and both sides are still arguing the toss.",
        2: "The central disagreement is not between lawyers and non-lawyers, but between two legal philosophies. One view treats the jury as bound strictly by judicial directions. The other sees the jury as a safeguard against unjust laws or unjust applications of law.",
        3: "From the perspective of state lawyers and legal eagles, the jury’s role is limited. They say that jurors are expected to determine facts and apply the law, strictly as directed by the judge.",
        4: "Civil liberties advocates and some constitutional historians argue the direct opposite. They accept jurors are instructed on the law, but argue the jury exists partly because law and justice are not always identical.",
        5: "Regardless of all this legal theory, the practical structure of the jury system is important. Jury deliberations are secret, and no external authority can interrogate how individual jurors reached their decisions.",
        6: "This is the core of the issue. If jurors act independently, in secret, without punishment, and their final decision is irreversible, then the practical reality is that it's a legal right in all but name.",
        7: "This debate is not new. It has existed for three centuries within the common law tradition. Constitutional cases like Bushell’s Case in 1670 are often cited.",
        8: "The conclusion is, that this is not a legal answer, but a constitutional dilemma. One side prioritises legal certainty and judicial direction. The other prioritises conscience and democratic legitimacy."
    };

    let audioPlayed = {};

    function updateUI() {
        document.getElementById('slideNum').textContent = `Slide ${currentSlide} / ${totalSlides}`;
        document.getElementById('prevBtn').style.visibility = (currentSlide === 1 && !isInQuiz) ? 'hidden' : 'visible';
        
        // On Slide 8 show Next (to Quiz), not Finish
        document.getElementById('quizBtn').style.display = (currentSlide === 8 && !isInQuiz) ? 'inline-block' : 'none';
        document.getElementById('nextBtn').style.display = isInQuiz ? 'none' : 'inline-block';
        document.getElementById('nextBtn').textContent = "Next";

        document.getElementById('slideImg').src = `Slide${currentSlide}.JPG`;
        updateAudioButton();
    }

    function updateAudioButton() {
        const btn = document.getElementById('audioBtn');
        btn.textContent = audioPlayed[currentSlide] ? "🔊 Replay Audio" : "🔊 Play Audio";
    }

    function toggleAudio() {
        const btn = document.getElementById('audioBtn');
        if (isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            updateAudioButton();
        } else {
            speakNotes();
        }
    }

    function speakNotes() {
        const btn = document.getElementById('audioBtn');
        const text = speakerNotes[currentSlide];
        if (!text) return;

        window.speechSynthesis.cancel();
        btn.textContent = "🔊 Speaking...";
        isSpeaking = true;

        const sentences = text.match(/[^.!?]+[.!?]+(?:\s|$)/g) || [text];
        let index = 0;

        const speakNext = () => {
            if (index >= sentences.length) {
                audioPlayed[currentSlide] = true;
                btn.textContent = "🔊 Replay Audio";
                isSpeaking = false;
                return;
            }
            const u = new SpeechSynthesisUtterance(sentences[index].trim());
            u.rate = 0.93;
            u.onend = () => { index++; speakNext(); };
            u.onerror = () => { isSpeaking = false; updateAudioButton(); };
            window.speechSynthesis.speak(u);
        };
        speakNext();
    }

    function goBack() {
        if (isInQuiz) {
            exitQuiz();
        } else {
            changeSlide(-1);
        }
    }

    function changeSlide(dir) {
        if (currentSlide === totalSlides && dir === 1) {
            showQuiz();           // Go to Quiz instead of Finish
            return;
        }
        currentSlide = Math.max(1, Math.min(totalSlides, currentSlide + dir));
        window.speechSynthesis.cancel();
        updateUI();
    }

    function showCompletion() {
        document.getElementById('slideImg').style.display = 'none';
        document.getElementById('quizStage').style.display = 'none';
        document.getElementById('completionScreen').style.display = 'flex';
        window.speechSynthesis.cancel();
    }

    function restartPresentation() {
        currentSlide = 1;
        isInQuiz = false;
        document.getElementById('completionScreen').style.display = 'none';
        updateUI();
    }

    function restartQuiz() {
        isInQuiz = true;
        document.getElementById('completionScreen').style.display = 'none';
        showQuiz();
    }

    function finishPresentation() {
        window.close();
    }

    // Quiz functions (unchanged)
    const quizQuestions = [
        { q: "1. Is 'jury nullification' officially recognised as a formal legal right?", correct: false },
        { q: "2. Do jury deliberations take place in secret?", correct: true },
        { q: "3. Can jurors be punished for their verdict?", correct: false },
        { q: "4. Is this debate a recent development?", correct: false },
        { q: "5. Does the jury act as a safeguard against unjust laws?", correct: true },
        { q: "6. Has the law given a single clear answer on jury conscience?", correct: false }
    ];

    let quizAnswers = [];

    function showQuiz() {
        isInQuiz = true;
        document.getElementById('slideImg').style.display = 'none';
        document.getElementById('quizStage').style.display = 'block';
        buildQuiz();
    }

    function buildQuiz() {
        quizAnswers = new Array(quizQuestions.length).fill(null);
        const container = document.getElementById('quizContent');
        container.innerHTML = '';

        quizQuestions.forEach((q, i) => {
            const block = document.createElement('div');
            block.className = 'question-block';
            block.innerHTML = `<div style="font-weight:600; margin-bottom:12px;">${q.q}</div>`;

            const yesBtn = document.createElement('button');
            yesBtn.className = 'option-btn';
            yesBtn.textContent = 'Yes ✓';
            yesBtn.onclick = () => selectAnswer(i, true, yesBtn, block);

            const noBtn = document.createElement('button');
            noBtn.className = 'option-btn';
            noBtn.textContent = 'No ✕';
            noBtn.onclick = () => selectAnswer(i, false, noBtn, block);

            block.appendChild(yesBtn);
            block.appendChild(noBtn);
            container.appendChild(block);
        });

        const submitBtn = document.createElement('button');
        submitBtn.className = 'btn btn-primary';
        submitBtn.style.margin = '25px auto';
        submitBtn.style.display = 'block';
        submitBtn.textContent = 'Submit Quiz';
        submitBtn.onclick = submitQuiz;
        container.appendChild(submitBtn);
    }

    function selectAnswer(index, value, clickedBtn, block) {
        quizAnswers[index] = value;
        const buttons = block.querySelectorAll('.option-btn');
        buttons.forEach(b => b.classList.remove('selected'));
        clickedBtn.classList.add('selected');
    }

    function submitQuiz() {
        if (quizAnswers.some(a => a === null)) {
            alert("Please answer all questions before submitting.");
            return;
        }

        let score = 0;
        const container = document.getElementById('quizContent');

        quizQuestions.forEach((q, i) => {
            if (quizAnswers[i] === q.correct) score++;
            const block = container.children[i];
            const buttons = block.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                const isYes = btn.textContent.includes('Yes');
                if (isYes === q.correct) btn.classList.add('correct');
                else if (isYes === quizAnswers[i]) btn.classList.add('wrong');
            });
        });

        const result = document.createElement('div');
        result.style.textAlign = 'center';
        result.style.margin = '25px 0';
        result.style.fontSize = '1.4rem';
        result.innerHTML = score === 6 ? '🎉 Perfect Score! Excellent work!' : `You scored ${score}/6`;
        container.appendChild(result);
    }

    function exitQuiz() {
        isInQuiz = false;
        document.getElementById('quizStage').style.display = 'none';
        document.getElementById('slideImg').style.display = 'block';
        updateUI();
    }

    window.onload = updateUI;
</script>
</body>
</html>
