<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Session 1: Law, Morality, and Conscience</title>
    <style>
        :root { --primary: #1e3a8a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 8px;
            background: #f3f4f6;
            min-height: 100dvh;
        }

        .app-container {
            max-width: 960px;
            margin: auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            height: calc(100dvh - 16px);
            display: flex;
            flex-direction: column;
        }

        .slide-viewer {
            flex: 1;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }

        .slide-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .quiz-container {
            position: absolute;
            inset: 0;
            background: #e2f0d9;
            padding: 20px;
            overflow-y: auto;
            display: none;
        }

        .question-block {
            background: white;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .option-btn {
            display: inline-block;
            width: 48%;
            margin: 6px 1%;
            padding: 14px;
            text-align: center;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .option-btn.selected { border-color: #1e3a8a; background: #f0f9ff; }
        .option-btn.correct { border-color: #10b981; background: #d1fae5; }
        .option-btn.wrong { border-color: #ef4444; background: #fee2e2; }

        .controls {
            padding: 12px;
            background: #f9fafb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-height: 52px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #059669; color: white; }
        .btn-quiz { background: #7c3aed; color: white; }
        .btn-restart { background: #64748b; color: white; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="slide-viewer">
        <img id="slideImg" class="slide-img" alt="Slide">
        
        <div id="quizStage" class="quiz-container">
            <div class="quiz-title">Session 1 Quiz: Timing 2 Minutes</div>
            <div id="quizContent"></div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn" class="btn btn-primary" onclick="goBack()">Back</button>
        
        <div style="display:flex; align-items:center; gap:10px; flex:1; justify-content:center; flex-wrap:wrap;">
            <span id="slideNum" style="font-weight:600;">Slide 1 / 8</span>
            <button id="audioBtn" class="btn btn-secondary" onclick="speakNotes()">🔊 Play Audio</button>
            <button id="quizBtn" class="btn btn-quiz" style="display:none;" onclick="showQuiz()">📝 Quiz</button>
        </div>
        
        <div style="display:flex; gap:8px;">
            <button id="nextBtn" class="btn btn-primary" onclick="changeSlide(1)">Next</button>
            <button id="restartBtn" class="btn btn-restart" style="display:none;" onclick="restartPresentation()">↺ Restart</button>
        </div>
    </div>
</div>

<script>
    let currentSlide = 1;
    const totalSlides = 8;
    let isInQuiz = false;

    const speakerNotes = { /* your full notes here */ };

    let audioPlayed = {};

    function updateUI() {
        document.getElementById('slideNum').textContent = `Slide ${currentSlide} / ${totalSlides}`;
        document.getElementById('prevBtn').disabled = currentSlide === 1;
        document.getElementById('quizBtn').style.display = (currentSlide === 8) ? 'inline-block' : 'none';
        document.getElementById('restartBtn').style.display = (currentSlide === 8) ? 'inline-block' : 'none';
        document.getElementById('nextBtn').textContent = (currentSlide === totalSlides) ? "Finish" : "Next";

        document.getElementById('slideImg').src = `Slide${currentSlide}.JPG`;
    }

    function speakNotes() {
        // full audio function as before
    }

    function goBack() {
        if (isInQuiz) {
            exitQuiz();
        } else {
            changeSlide(-1);
        }
    }

    function changeSlide(dir) {
        if (currentSlide === totalSlides && dir === 1) {
            if (confirm("Close presentation?")) window.close();
            return;
        }
        currentSlide = Math.max(1, Math.min(totalSlides, currentSlide + dir));
        window.speechSynthesis.cancel();
        updateUI();
    }

    function restartPresentation() {
        currentSlide = 1;
        window.speechSynthesis.cancel();
        updateUI();
    }

    // Quiz functions (full working version)
    const quizQuestions = [ /* your 6 questions */ ];

    let quizAnswers = [];

    function showQuiz() {
        isInQuiz = true;
        document.getElementById('slideImg').style.display = 'none';
        document.getElementById('quizStage').style.display = 'block';
        buildQuiz();
    }

    function buildQuiz() { /* full buildQuiz as before */ }

    function exitQuiz() {
        isInQuiz = false;
        document.getElementById('quizStage').style.display = 'none';
        document.getElementById('slideImg').style.display = 'block';
    }

    window.onload = updateUI;
</script>
</body>
</html>
